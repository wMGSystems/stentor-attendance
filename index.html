<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<script>
  (function() {
    try {
      var isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      var meta = document.getElementById('theme-color-meta');
      if (meta) meta.setAttribute('content', isDark ? '#059669' : '#10b981');
    } catch(e) {}
  })();
</script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;900&display=swap');

:root {
  --bg-primary:#ffffff; --bg-secondary:#f7f9fa;
  --text-primary:#111827; --text-secondary:#4b5563; --text-tertiary:#9ca3af;
  --border-color:#e5e7eb; --input-bg:#f9fafb; --input-border:#d1d5db;
  --button-secondary-bg:#eff6ff;
  --success-color:#10b981; --error-color:#ef4444;
  --warning-bg:#fef2f2; --warning-border:#fecaca; --warning-text:#b91c1c;
  --success-card-bg:#f0fdf4; --success-card-border:#bbf7d0;
  --label-text:#6b7280;
  --theme-chan:#10b981; --theme-carr:#3b82f6; 
  --dynamic-primary:var(--theme-chan);
  --modal-overlay:rgba(0,0,0,0.65); --shadow-color:rgba(0,0,0,0.1);
}

@media (prefers-color-scheme:dark) {
  :root {
    --bg-primary:#1f2937; --bg-secondary:#111827;
    --text-primary:#f9fafb; --text-secondary:#d1d5db; --text-tertiary:#9ca3af;
    --border-color:#374151; --input-bg:#374151; --input-border:#4b5563;
    --button-secondary-bg:#1e3a8a;
    --success-color:#34d399; --error-color:#f87171;
    --warning-bg:#450a0a; --warning-border:#7f1d1d; --warning-text:#fca5a5;
    --success-card-bg:#064e3b; --success-card-border:#065f46;
    --label-text:#9ca3af;
    --theme-chan:#059669; --theme-carr:#2563eb; 
    --modal-overlay:rgba(0,0,0,0.85); --shadow-color:rgba(0,0,0,0.5);
  }
}

/* SCROLLBAR REMOVAL */
::-webkit-scrollbar { display: none; }
* { -ms-overflow-style: none; scrollbar-width: none; box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Nunito', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
  color:var(--text-primary); background-color: var(--dynamic-primary);
  min-height:100vh; min-height:100dvh; display:flex; flex-direction:column;
  align-items:center; justify-content:center; 
  padding:env(safe-area-inset-top, 16px) 12px env(safe-area-inset-bottom, 16px); 
  overflow-y:auto; -webkit-overflow-scrolling:touch;
  transition: background-color 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}
input, textarea, select { -webkit-user-select: auto; user-select: auto; font-family: inherit;}
.view-section, .btn-primary, .btn-secondary, .pill-btn, .back-pill, .menu-card, .hanging-sign, .chip-span, .order-group-title { -webkit-user-select: none; user-select: none; }

/* THEME HANDLING */
body::before { content: ""; position: fixed; inset: 0; background: linear-gradient(135deg, #059669 0%, #2563eb 100%); opacity: 0; visibility: hidden; z-index: -1; transition: opacity 0.3s ease; pointer-events: none; }
body.theme-hub { background-color: var(--bg-primary); }
body.theme-hub::before { opacity: 1; visibility: visible; }
body.theme-chandarana{--dynamic-primary:var(--theme-chan)}
body.theme-carrefour {--dynamic-primary:var(--theme-carr);--success-color:#3b82f6}

/* GLOBAL UI */
.view-section { display: none; width: 100%; max-width: 440px; flex-direction: column; align-items: center; position: relative; opacity: 0; transform: translateY(15px); }
.view-section.active { display: flex; opacity: 1; animation: sectionFadeIn 0.35s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
@keyframes sectionFadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: none; } }
@keyframes bounceIn{ 0%{transform:scale(0.9);opacity:0} 60%{transform:scale(1.05)} 100%{transform:scale(1);opacity:1} }
@keyframes spin{ to { transform: rotate(360deg); } }

/* Back Button */
.back-pill { 
  position: fixed; bottom: 24px; left: 24px; z-index: 9999; 
  background: var(--dynamic-primary); color: #fff; font-weight: 800; font-size: 15px; 
  padding: 14px 26px; border-radius: 50px; 
  box-shadow: 0 10px 25px rgba(0,0,0,0.35), inset 0 1px 1px rgba(255,255,255,0.2);
  border: 1px solid rgba(255,255,255,0.3);
  cursor: pointer; display: flex; align-items: center; gap: 8px; 
  transition: 0.3s; opacity: 0; pointer-events: none; 
}
.back-pill.show { opacity: 1; pointer-events: auto; }
.back-pill:active { transform: scale(0.92); }

/* HUB MENU */
.menu-container { width: 100%; display: flex; flex-direction: column; align-items: center; max-width: 340px; z-index: 2; margin-bottom: 15vh; }
.hub-logo { font-size: 36px; font-weight: 900; color: #fff; text-shadow: 0 4px 10px rgba(0,0,0,0.2); margin-bottom: 6px; }
.menu-subtitle { color: rgba(255,255,255,0.9); font-weight: 700; font-size: 16px; margin-bottom: 30px; }
.menu-cards { width: 100%; display: flex; flex-direction: column; gap: 20px; }
.menu-card { display: flex; align-items: center; background: var(--bg-primary); border-radius: 24px; padding: 22px; gap: 20px; width: 100%; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 1px solid var(--border-color); cursor: pointer; opacity: 0; }
.menu-card:active { transform: scale(0.96) !important; transition: transform 0.2s; }
#view-menu.active .menu-card:nth-child(1) { animation: slideInLeft 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; animation-delay: 0.05s; }
#view-menu.active .menu-card:nth-child(2) { animation: slideInRight 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; animation-delay: 0.1s; }
@keyframes slideInLeft { from { opacity: 0; transform: translateX(-60px); } to { opacity: 1; transform: translateX(0); } }
@keyframes slideInRight { from { opacity: 0; transform: translateX(60px); } to { opacity: 1; transform: translateX(0); } }
.mc-icon { font-size: 40px; background: var(--button-secondary-bg); width: 76px; height: 76px; display: flex; align-items: center; justify-content: center; border-radius: 20px; flex-shrink: 0;}
.mc-content h3 { margin: 0 0 6px; font-size: 24px; font-weight: 900; color: var(--text-primary); text-transform: uppercase;}
.mc-content p { margin: 0; font-size: 15px; font-weight: 700; color: var(--text-secondary); }

/* SHARED APP CONTAINER */
.app-container { width: 100%; background:var(--bg-primary); padding:24px 22px; border-radius:24px; box-shadow:0 15px 35px rgba(0,0,0,0.1); position:relative; overflow:hidden; display:flex; flex-direction:column; justify-content:center; transition: background 0.4s ease; }
.app-container.scrollable { max-height: 85vh; overflow-y: auto; overflow-x: hidden; padding-bottom: 30px; justify-content:flex-start; }

/* TERMINAL PILLS */
.top-bar { display:flex; justify-content:center; margin-bottom:20px; width: 100%; position: relative; z-index: 5;}
.terminal-pill-wrapper { position:relative; display:inline-flex; background:var(--input-bg); border:1px solid var(--border-color); border-radius:50px; padding:4px; height:46px; align-items:center; }
.pill-slider { position:absolute; top:4px; bottom:4px; left:4px; border-radius:50px; background:var(--dynamic-primary); box-shadow:0 2px 6px rgba(0,0,0,0.15); transition:all 0.35s cubic-bezier(0.25,1,0.5,1); z-index:1; }
.pill-btn { position:relative; z-index:2; background:transparent; border:none; padding:0 20px; height:100%; font-size:14px; font-weight:800; color:var(--text-secondary); cursor:pointer; outline:none; transition:color 0.2s; }
.pill-btn.active { color:#fff; }

/* SHARED INPUTS & BUTTONS */
.input-label { font-weight:700; font-size:12px; display:block; margin-bottom:8px; color:var(--label-text); text-transform:uppercase; letter-spacing:0.5px;}
.ui-input, .ui-select { width:100%; height:52px; padding:0 16px; border-radius:14px; border:1px solid var(--input-border); font-size:16px; font-weight:700; background:var(--input-bg); color:var(--text-primary); transition: 0.2s; outline:none; -webkit-appearance:none; position:relative; z-index:10; cursor:pointer;}
.ui-input:focus, .ui-select:focus { border-color:var(--dynamic-primary); background:var(--bg-primary); box-shadow:0 0 0 3px rgba(16,185,129,0.1); }
body.theme-carrefour .ui-input:focus, body.theme-carrefour .ui-select:focus {box-shadow:0 0 0 3px rgba(59,130,246,0.1)}
.ui-input:read-only { background: var(--bg-secondary); color: var(--dynamic-primary); border-color: transparent; }

.btn-primary { width:100%; height:52px; border-radius:14px; border:none; font-size:15px; font-weight:800; background:var(--button-secondary-bg); color:var(--dynamic-primary); cursor:pointer; display:flex; align-items:center; justify-content:center; transition: transform 0.1s, opacity 0.2s, background 0.2s; }
.btn-primary:active { transform: scale(0.97); }
.btn-primary:disabled { opacity: 0.5; pointer-events: none; }
.btn-primary.solid { background:var(--dynamic-primary); color:#fff; margin-top:8px;}
.btn-secondary { width:100%; height:46px; border-radius:12px; border:none; font-size:15px; font-weight:800; background:var(--button-secondary-bg); color:var(--dynamic-primary); cursor:pointer; transition: transform 0.1s; }
.btn-secondary:active { transform: scale(0.97); }
.btn-spinner { border: 2px solid rgba(0,0,0,0.1); border-top-color: currentColor; border-radius: 50%; animation: spin 0.6s linear infinite; width:16px; height:16px; margin-right:8px;}

/* ORDERS SPECIFIC */
.section-card { border: 1px solid var(--border-color); border-radius: 18px; padding: 14px; background: var(--bg-primary); margin-bottom: 15px; }
#o-id { color: var(--dynamic-primary); font-weight: 900; font-size: 18px; }
#o-id::placeholder { color: var(--text-tertiary); opacity: 0.8; font-weight: 700; }
.locked-form { opacity: 0.4; pointer-events: none; transition: 0.4s; }
.locked-form.unlocked { opacity: 1; pointer-events: auto; }
.order-group { border: 1px solid var(--border-color); border-radius: 12px; margin-bottom: 12px; background: var(--bg-primary); overflow: hidden; }
.order-group-title { padding: 14px 16px; font-size: 14px; font-weight: 900; color: var(--text-primary); cursor: pointer; display: flex; justify-content: space-between; align-items: center; background: var(--bg-secondary); outline: none; list-style: none; }
.order-group-title::-webkit-details-marker { display: none; }
.order-group-title::after { content: '+'; font-size: 18px; color: var(--dynamic-primary); font-weight: 400;}
.order-group[open] .order-group-title::after { content: '-'; transform: rotate(180deg); }
.order-group-content { padding: 14px; border-top: 1px solid var(--border-color); }
table { width: 100%; border-collapse: separate; border-spacing: 0; text-align: center; }
th, td { padding: 8px 4px; border-bottom: 1px solid var(--border-color); border-right: 1px solid var(--border-color); }
th { background: var(--bg-secondary); font-weight: 900; font-size: 12px; width: 35%; text-transform: uppercase;}
th:first-child, td.flavor-name { position: sticky; left: 0; background: var(--bg-primary); z-index: 10; text-align: left; padding-left: 8px; font-weight:800; font-size:11px;}
.square-input { width: 50px; height: 34px; border-radius: 10px; margin: 0 auto; background: var(--input-bg); border: 2px solid var(--input-border); color: var(--text-tertiary); font-weight: 900; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
.square-input.has-value { background: var(--dynamic-primary); color: #fff; border-color: var(--dynamic-primary); }
.chip-group { display: flex; flex-wrap: wrap; gap: 8px; }
.chip-label input { display: none; }
.chip-span { display: inline-flex; background: var(--input-bg); border: 1px solid var(--input-border); padding: 10px 16px; border-radius: 50px; font-size: 13px; font-weight: 800; color: var(--text-secondary); transition: 0.2s; }
.chip-label input:checked + .chip-span { background: var(--dynamic-primary); color: #fff; border-color: var(--dynamic-primary); transform: translateY(-2px); }

/* ATTENDANCE SPECIFIC */
.app-wrapper { position: relative; width: 100%; max-width: 420px; display: flex; flex-direction:column; align-items: center; justify-content: center; padding-top:20px; margin-bottom: 10vh; z-index: 1;}

.hanging-sign-wrapper { position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); margin-bottom: -5px; perspective: 800px; z-index: 10; width: 240px; pointer-events: none; }
.chain { position: absolute; top: -30px; width: 5px; height: 34px; background: linear-gradient(to right, #9ca3af, #f3f4f6, #9ca3af); border-radius: 3px; box-shadow: inset 0 0 3px rgba(0,0,0,0.3), 0 2px 4px rgba(0,0,0,0.2); z-index: 1; pointer-events: none; }
.chain::before { content: ''; position: absolute; top: -6px; left: -3.5px; width: 12px; height: 12px; border-radius: 50%; background: var(--dynamic-primary); border: 3.5px solid #d1d5db; box-shadow: 0 8px 12px rgba(0,0,0,0.6), 0 3px 6px rgba(0,0,0,0.4), inset 0 2px 4px rgba(0,0,0,0.7); box-sizing: border-box; transition: background 0.6s cubic-bezier(0.4, 0, 0.2, 1); pointer-events: none; }
.left-chain { left: 40px; } .right-chain { right: 40px; }
.hanging-sign { background: var(--bg-primary); color: var(--dynamic-primary); padding: 12px 10px; border-radius: 12px; font-weight: 900; font-size: 20px; text-transform: uppercase; letter-spacing: 2px; text-align: center; width: 100%; display: block; box-sizing: border-box; box-shadow: 0 10px 25px var(--shadow-color), inset 0 -3px 0 rgba(0,0,0,0.05); transform-origin: top center; transition: color 0.4s ease; position: relative; z-index: 2; }
@keyframes swing { 0% { transform: rotateX(0deg) rotateZ(0deg); } 20% { transform: rotateX(25deg) rotateZ(-3deg); } 40% { transform: rotateX(-15deg) rotateZ(2deg); } 60% { transform: rotateX(8deg) rotateZ(-1deg); } 80% { transform: rotateX(-3deg) rotateZ(0deg); } 100% { transform: rotateX(0deg) rotateZ(0deg); } }
.hanging-sign.nudge { animation: swing 0.7s cubic-bezier(0.25, 1, 0.5, 1); }

.network-indicator{ position:absolute;top:18px;left:18px;width:8px;height:8px;border-radius:50%; background:var(--success-color);opacity:0.8;transition:background 0.4s ease; box-shadow: 0 0 6px var(--success-color); }
.network-indicator.offline{background:var(--text-tertiary);opacity:0.4; box-shadow:none;}

.step-grid{display:grid;grid-template-columns:1fr 1fr;gap:28px 16px; position: relative; z-index: 5;}
.step { opacity:0.3; pointer-events:none; transition: opacity 0.4s ease; position: relative; z-index: 10;}
.step.activeStep { opacity:1; pointer-events:auto; animation:bounceIn 0.45s ease; }

.msg{ font-size:13px;font-weight:600;margin-top:8px; min-height:42px; align-items:flex-start; line-height:1.4; color:var(--text-tertiary);display:flex; transition: opacity 0.3s ease, color 0.3s ease; opacity: 1; pointer-events: none;}
.msg.success{color:var(--success-color);font-size:14px} .msg.error{color:var(--error-color)}
.msg .dot{ display:inline-flex;justify-content:center;align-items:center; width:16px;height:16px;background:var(--success-color);border-radius:50%; margin-right:8px;flex-shrink:0;position:relative; margin-top: 2px; }
.msg .dot::after{ content:'';position:absolute;top:45%;left:50%; width:3.5px;height:7px; border-right:2px solid #fff;border-bottom:2px solid #fff; transform:translate(-50%,-50%) rotate(45deg); }

/* PERFECT FLAWLESS GLASS OVERLAYS */
.glass-overlay { 
  position: fixed; top: 0; left: 0; right: 0; bottom: 0; 
  width: 100vw; height: 100vh; height: 100dvh;
  background: rgba(10, 10, 10, 0.6); 
  backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); 
  margin: 0; padding: 0; z-index: 10000; 
  opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
  transform: translateZ(0);
}
.glass-overlay.show { opacity: 1; pointer-events: auto; }

#videoContainerWrapper{ 
  position:fixed; top: 50%; left: 50%; 
  width: 85%; max-width: 380px; aspect-ratio: 3 / 4; 
  border-radius: 28px; overflow: hidden; 
  z-index: 10001; background-color: #000; 
  box-shadow: 0 25px 60px rgba(0,0,0,0.6);
  transition: opacity 0.3s ease, transform 0.35s cubic-bezier(0.25, 1, 0.4, 1); 
  transform: translate(-50%, -50%) scale(0.95); opacity: 0; pointer-events: none; 
  -webkit-mask-image: -webkit-radial-gradient(white, black); 
}
#videoContainerWrapper.expanded{ pointer-events:auto; opacity:1; transform: translate(-50%, -50%) scale(1); }

#cameraVideo{ position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; display:block; transform: scaleX(-1); opacity: 0; transition: opacity 0.4s ease; }
#cameraVideo.live { opacity: 1; }
.camera-ui{ position:absolute;bottom:0;left:0;right:0; padding:24px; background:linear-gradient(to top,rgba(0,0,0,0.8) 0%,transparent 100%); display:flex;align-items:center;justify-content:center; z-index:3; }
#captureBtn{ width:68px;height:68px;border-radius:50%; background:rgba(255,255,255,0.3);border:4px solid rgba(255,255,255,0.95); cursor:pointer;display:flex;align-items:center;justify-content:center; transition:transform 0.1s;-webkit-tap-highlight-color:transparent; }
#captureBtn::after{content:'';width:50px;height:50px;background:#fff;border-radius:50%;transition:transform 0.1s}
#captureBtn:active{transform:scale(0.88)}
#captureBtn:active::after{transform:scale(0.9)}

/* SUCCESS SCREENS */
#attSuccessScreen { display:none;flex-direction:column;align-items:center; justify-content:center; padding:10px 4px;text-align:center;width:100%; }
.success-photo{ width: 120px; height: 120px; object-fit: cover; border-radius: 50%; box-shadow: 0 0 0 4px var(--success-color); margin-bottom: 20px; animation: bounceIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); cursor: zoom-in; position: relative; z-index: 10; -webkit-tap-highlight-color: transparent; }
.success-badge{ background:var(--dynamic-primary);color:#fff;font-size:14px;font-weight:800; text-transform:uppercase;padding:8px 24px;border-radius:999px; margin-bottom:24px;display:inline-block;box-shadow:0 4px 10px rgba(0,0,0,0.1); animation:bounceIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) 0.05s backwards; }
.success-card{ background:var(--success-card-bg);border:1px solid var(--success-card-border); border-radius:20px;padding:24px 20px;width:100%;margin-bottom:20px; animation:bounceIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) 0.1s backwards; }
.success-name{font-size:26px;font-weight:800;color:var(--dynamic-primary);margin-bottom:8px}
.success-msg {font-size:15px;font-weight:600;color:var(--text-secondary);line-height:1.5}

/* RECEIPT & MODALS */
.modal-overlay { display:none; position:fixed; inset:0; background:var(--modal-overlay); z-index:19999; flex-direction:column; align-items:center; justify-content:center; padding:20px; backdrop-filter:blur(5px); -webkit-backdrop-filter:blur(5px); }
.modal-box { background:var(--bg-primary); padding:28px; border-radius:20px; text-align:center; max-width:360px; width:100%; box-shadow: 0 20px 40px rgba(0,0,0,0.2); max-height: 85vh; display: flex; flex-direction: column; }
.modal-instructions{ background:var(--input-bg);color:var(--text-secondary); padding:16px;border-radius:12px;margin-bottom:18px; font-size:14px;line-height:1.6;text-align:left; border: 1px solid var(--border-color); }
.receipt-header { display:none; }
.receipt-content { flex: 1; overflow-y: auto; text-align: left; padding: 16px; background: var(--bg-primary); border-radius: 12px; margin: 16px 0; border: 1px solid var(--border-color); color: var(--text-primary); font-size: 14px; line-height: 1.6; font-weight: 700; box-shadow: 0 4px 12px var(--shadow-color); }
.modal-actions { display: flex; flex-direction: column; gap: 8px; }

/* DYNAMIC MORPHING OVERLAY */
#photoZoomContainer { display:none; position:fixed; inset:0; z-index:20000; pointer-events:none; }
#photoZoomBg { position: absolute; inset:0; }
#zoomedImage { 
  position: absolute; 
  object-fit: cover; 
  box-shadow: 0 0 0 4px var(--success-color), 0 25px 60px rgba(0,0,0,0.6);
  z-index: 20001;
  cursor: zoom-out;
}
</style>
</head>
<body class="theme-hub">

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwVy7MbFQmI6fVQM0ti52y05c0rc7-KvqUsU3Uq3WXzJ1CEqYP3vF0noIJbNtuL4nOT/exec";

var Storage = { 
  set:function(k,v){try{localStorage.setItem(k,v)}catch(e){}}, 
  get:function(k){try{return localStorage.getItem(k)}catch(e){return null}}, 
  remove:function(k){try{localStorage.removeItem(k)}catch(e){}} 
};

function purgeCacheAtMidnight() {
  var today = new Date().toDateString(); 
  if (Storage.get('cache_date') !== today) {
    Storage.remove('chandarana_portal_data');
    Storage.remove('carrefour_portal_data');
    Storage.remove('order_staff_chandarana');
    Storage.remove('order_staff_carrefour');
    Storage.set('cache_date', today);
  }
}
</script>

<!-- BACK BUTTON -->
<div class="back-pill" id="globalBackBtn" onclick="goHome()">
  <span style="font-size: 18px; margin-right: 4px;">←</span> Menu
</div>

========================== -->

========================== -->
<script>
// --- NAVIGATION CONTROLLER ---
let activeStore = 'chandarana', currentTerminal = Storage.get('selected_terminal') || 'chandarana';

document.addEventListener('DOMContentLoaded', function() {
  purgeCacheAtMidnight(); 
  loadOrderStaffBackground(); 
  fetchPortalDataSilent(); // Fetch attendance branches silently for relieving auto-fill
  window.addEventListener('online', () => {
    checkNetworkStatus();
    processAttendanceQueue(); // Process any queued offline submissions immediately
  }); 
  window.addEventListener('offline', checkNetworkStatus);
});

function checkNetworkStatus() { 
  const ind = document.getElementById('networkIndicator'); 
  if (ind) navigator.onLine ? ind.classList.remove('offline') : ind.classList.add('offline'); 
}

function switchView(viewId) {
  document.querySelectorAll('.view-section').forEach(v => {
    if (v.id === viewId) { 
      v.style.display = 'flex'; 
      v.classList.remove('active'); 
      void v.offsetWidth; // Force reflow for crisp animation
      v.classList.add('active'); 
    } else { 
      v.classList.remove('active'); 
      v.style.display = 'none'; 
    }
  });
}

function goHome() { 
  if (document.getElementById('view-orders').classList.contains('active')) saveOrderState();
  if (document.getElementById('view-attendance').classList.contains('active')) stopCamera();
  
  document.getElementById('globalBackBtn').classList.remove('show');
  switchView('view-menu'); document.body.className = 'theme-hub';
  const meta = document.getElementById('theme-color-meta'); if (meta) meta.setAttribute('content', '#059669');
}

function updatePillSlider(containerId, sliderId) {
  setTimeout(() => {
    const ab = document.querySelector(`#${containerId} .pill-btn.active`);
    const sl = document.getElementById(sliderId);
    if (ab && sl) { sl.style.width = ab.offsetWidth + 'px'; sl.style.left = ab.offsetLeft + 'px'; }
  }, 50);
}

// Background Silently Fetch Attendance for Relieving checks
function fetchPortalDataSilent() {
  ['chandarana', 'carrefour'].forEach(term => {
    fetch(SCRIPT_URL, { method:'POST', headers:{'Content-Type':'text/plain'}, body:JSON.stringify({action:'getPortalData', terminal:term}) })
    .then(r => r.json())
    .then(j => {
      if(j.ok) {
        Storage.set(term + '_portal_data', JSON.stringify(j.data));
      }
    }).catch(e=>{});
  });
}

// ==========================================
// ORDER SYSTEM LOGIC
// ==========================================
let orderStaffCache = { chandarana: [], carrefour: [] }; 
let currentOrderStaffFullname = "";
let orderState = { chandarana: { juices: {}, fresh: [], bottles: [], haccp: [] }, carrefour: { juices: {}, fresh: [], bottles: [], haccp: [] } };
let orderStoreState = { chandarana: { id: '' }, carrefour: { id: '' } }; 

function openOrder() {
  document.getElementById('globalBackBtn').classList.add('show');
  document.getElementById('orderForm').style.display = 'block'; document.getElementById('orderTopBar').style.display = 'flex'; document.getElementById('orderSuccessScreen').style.display = 'none';
  switchView('view-orders'); switchTerminalOrder(activeStore);
}

function switchTerminalOrder(store) {
  orderStoreState[activeStore].id = document.getElementById('o-id').value;
  saveOrderState(); 
  
  activeStore = store; 
  document.body.className = store === 'chandarana' ? 'theme-chandarana' : 'theme-carrefour';
  var isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  var meta = document.getElementById('theme-color-meta'); if (meta) meta.setAttribute('content', store === 'chandarana' ? (isDark ? '#059669' : '#10b981') : (isDark ? '#2563eb' : '#3b82f6'));

  document.getElementById('o-btn-chandarana').classList.toggle('active', store === 'chandarana'); document.getElementById('o-btn-carrefour').classList.toggle('active', store === 'carrefour');
  
  updatePillSlider('o-terminal-wrapper', 'o-pill-slider');
  renderDynamicOrderContent(); restoreOrderState();
  
  let savedId = orderStoreState[store].id || Storage.get('last_order_id_' + store) || '';
  document.getElementById('o-id').value = savedId;
  instantOrderStaffCheck(savedId);
}

function loadOrderStaffBackground() {
  purgeCacheAtMidnight();
  const cachedChan = localStorage.getItem('order_staff_chandarana');
  const cachedCarr = localStorage.getItem('order_staff_carrefour');
  
  if (cachedChan && cachedCarr) { 
    orderStaffCache.chandarana = JSON.parse(cachedChan);
    orderStaffCache.carrefour = JSON.parse(cachedCarr);
  }
  
  fetch(SCRIPT_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ action: 'getOrderStaff' }) })
    .then(r => r.json())
    .then(res => { 
      if(res.ok) { 
        orderStaffCache = res.data; 
        localStorage.setItem('order_staff_chandarana', JSON.stringify(res.data.chandarana)); 
        localStorage.setItem('order_staff_carrefour', JSON.stringify(res.data.carrefour)); 
      } 
    }).catch(e => {});
}

// Branch Selection Logic for Orders (Hold to Edit & Smart Lock)
let branchHoldTimer;
function startBranchHold(e) {
  if (e.type === 'mousedown' && e.button !== 0) return;
  branchHoldTimer = setTimeout(() => {
     unlockBranchSelect();
     if(navigator.vibrate) navigator.vibrate(50);
  }, 600); // 600ms hold
}
function cancelBranchHold() { clearTimeout(branchHoldTimer); }

function lockBranchSelect(isAttendanceVerified) {
  const sel = document.getElementById('o-branch'), overlay = document.getElementById('o-branch-overlay'), icon = document.getElementById('o-branch-lock-icon');
  
  sel.style.pointerEvents = 'none'; 
  sel.style.appearance = 'none'; 
  sel.style.color = 'var(--dynamic-primary)';
  sel.style.fontWeight = '900';
  
  if (isAttendanceVerified) {
    icon.style.display = 'none';
    overlay.style.display = 'none';
    sel.style.background = 'var(--bg-secondary)'; 
    sel.style.borderColor = 'transparent';
  } else {
    icon.style.display = 'inline';
    icon.innerText = '🔒 Hold to edit';
    overlay.style.display = 'block';
    sel.style.background = 'var(--input-bg)'; 
    sel.style.borderColor = 'var(--input-border)';
  }
}

function unlockBranchSelect() {
  const sel = document.getElementById('o-branch'), overlay = document.getElementById('o-branch-overlay'), icon = document.getElementById('o-branch-lock-icon');
  sel.style.pointerEvents = 'auto'; 
  sel.style.appearance = 'auto'; 
  sel.style.color = 'var(--dynamic-primary)';
  sel.style.fontWeight = '900';
  overlay.style.display = 'none'; 
  icon.style.display = 'inline';
  icon.innerText = '🔓 Select below';
  sel.style.background = 'var(--input-bg)';
  sel.style.borderColor = 'var(--input-border)';
}

function populateOrderBranches() {
   const sel = document.getElementById('o-branch');
   let chanBranches = [], carrBranches = [];
   try { const pData = JSON.parse(Storage.get('chandarana_portal_data')); if (pData && pData.branches) chanBranches = pData.branches.map(b => b[0]); } catch(e) {}
   try { const pData = JSON.parse(Storage.get('carrefour_portal_data')); if (pData && pData.branches) carrBranches = pData.branches.map(b => b[0]); } catch(e) {}
   
   let html = `<optgroup label="Chandarana" style="color: var(--theme-chan); font-weight: 900;">` + chanBranches.map(b => `<option value="${b}" data-store="chandarana" style="color: var(--text-primary); font-weight: 700;">${b}</option>`).join('') + `</optgroup>`;
   html += `<optgroup label="Carrefour" style="color: var(--theme-carr); font-weight: 900;">` + carrBranches.map(b => `<option value="${b}" data-store="carrefour" style="color: var(--text-primary); font-weight: 700;">${b}</option>`).join('') + `</optgroup>`;
   
   sel.innerHTML = html;
}

document.getElementById('o-branch').addEventListener('change', function(e) {
  const opt = this.options[this.selectedIndex];
  const selectedStore = opt.getAttribute('data-store');
  const selectedBranch = this.value;
  const currentId = document.getElementById('o-id').value;

  if (selectedStore && selectedStore !== activeStore) {
    instantOrderStaffCheck(currentId, selectedStore, selectedBranch);
  }
});

function processStaffMatch(val, match, defaultStore, forcedStore, forcedBranch) {
  let isAttendanceVerified = false;
  let targetStore = defaultStore;
  let targetBranch = match.branch;
  let relievedMsg = '';

  const storesToCheck = ['chandarana', 'carrefour'];
  let latestClockInTime = 0;
  let clockedInStore = null;
  let clockedInBranch = null;

  storesToCheck.forEach(store => {
    try {
      const pData = JSON.parse(Storage.get(store + '_portal_data'));
      const s = pData?.staff?.find(x => x.id === val);
      if (s && s.lastTime) {
        const d = new Date(s.lastTime), now = new Date();
        if (d.getDate() === now.getDate() && d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear()) {
          if (s.lastTime > latestClockInTime) {
            latestClockInTime = s.lastTime;
            clockedInStore = store;
            clockedInBranch = s.branch; 
          }
        }
      }
    } catch(e) {}
  });

  if (clockedInStore && clockedInBranch) {
    targetStore = clockedInStore;
    targetBranch = clockedInBranch;
    isAttendanceVerified = true;
    if (targetStore !== defaultStore || targetBranch !== match.branch) relievedMsg = ' (Auto-detected)';
  }

  if (forcedBranch && forcedStore) {
    targetStore = forcedStore;
    targetBranch = forcedBranch;
    isAttendanceVerified = false; 
    relievedMsg = '';
  }

  if (targetStore !== activeStore) {
    orderStoreState[activeStore].id = document.getElementById('o-id').value;
    saveOrderState();

    activeStore = targetStore;
    document.body.className = targetStore === 'chandarana' ? 'theme-chandarana' : 'theme-carrefour';
    var isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    var meta = document.getElementById('theme-color-meta'); if (meta) meta.setAttribute('content', targetStore === 'chandarana' ? (isDark ? '#059669' : '#10b981') : (isDark ? '#2563eb' : '#3b82f6'));

    document.getElementById('o-btn-chandarana').classList.toggle('active', targetStore === 'chandarana'); 
    document.getElementById('o-btn-carrefour').classList.toggle('active', targetStore === 'carrefour');
    
    updatePillSlider('o-terminal-wrapper', 'o-pill-slider');
    renderDynamicOrderContent(); restoreOrderState();
  }

  Storage.set('last_order_id_' + activeStore, val); 
  const msgDiv = document.getElementById('o-staffMsg'), nameInp = document.getElementById('o-name'), nameCont = document.getElementById('o-name-container'), expFields = document.getElementById('o-expanded-fields'), lockedSec = document.getElementById('o-locked-section');
  
  currentOrderStaffFullname = match.name;
  const parts = match.name.trim().split(' '); 
  nameInp.value = parts.slice(0, 2).join(' ') + (parts.length>2?'...':'');

  populateOrderBranches(); 
  const sel = document.getElementById('o-branch');
  sel.value = targetBranch;
  
  if (sel.value !== targetBranch) {
      const opt = document.createElement('option');
      opt.value = targetBranch;
      opt.textContent = targetBranch;
      opt.setAttribute('data-store', targetStore);
      sel.appendChild(opt);
      sel.value = targetBranch;
  }

  lockBranchSelect(isAttendanceVerified);
  document.getElementById('o-phone').value = match.phone || '';
  
  nameCont.style.opacity = '1'; expFields.style.display='block'; lockedSec.classList.add('unlocked');
  msgDiv.innerHTML = `<span class="dot"></span> ID Verified${relievedMsg}`; 
  msgDiv.className = 'msg success'; 
}

function instantOrderStaffCheck(val, forcedStore = null, forcedBranch = null) {
  val = val.trim(); 
  const msgDiv = document.getElementById('o-staffMsg'), nameCont = document.getElementById('o-name-container'), nameInp = document.getElementById('o-name'), expFields = document.getElementById('o-expanded-fields'), lockedSec = document.getElementById('o-locked-section');
  
  if(val.length < 2) { 
    msgDiv.innerHTML = ''; nameInp.value = ''; currentOrderStaffFullname = ''; document.getElementById('o-branch').innerHTML = ''; document.getElementById('o-phone').value = ''; nameCont.style.opacity = '0'; expFields.style.display='none'; lockedSec.classList.remove('unlocked'); 
    Storage.remove('last_order_id_' + activeStore); return; 
  }

  let match = orderStaffCache.chandarana.find(s => s.id === val);
  let defaultStore = match ? 'chandarana' : null;
  if (!match) {
     match = orderStaffCache.carrefour.find(s => s.id === val);
     if (match) defaultStore = 'carrefour';
  }
  
  if(match) {
    processStaffMatch(val, match, defaultStore, forcedStore, forcedBranch);
  } else { 
    msgDiv.innerHTML = '<span class="btn-spinner" style="width:14px;height:14px;"></span> Searching...'; msgDiv.className = 'msg';
    nameCont.style.opacity = '0'; expFields.style.display='none'; lockedSec.classList.remove('unlocked');
    
    fetch(SCRIPT_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ action: 'fetchUser', id: val }) })
    .then(r => r.json())
    .then(res => {
       if (document.getElementById('o-id').value.trim() !== val) return;
       if (res.found) { 
         orderStaffCache[res.store].push({id: val, name: res.name, phone: res.phone, branch: res.branch}); 
         processStaffMatch(val, {name: res.name, phone: res.phone, branch: res.branch}, res.store, forcedStore, forcedBranch);
       } else { 
         msgDiv.innerHTML = 'Invalid ID'; msgDiv.className = 'msg error'; 
       }
    }).catch(e => { if (document.getElementById('o-id').value.trim() === val) { msgDiv.innerHTML = 'Network Error'; msgDiv.className = 'msg error'; } });
  }
}

const JUICES = { chandarana: ["ORANGE", "TROPICAL MIX", "MANGO", "PASSION", "APPLE GINGER", "TREE TOMATO", "PINEAPPLE MINT", "LIME & GINGER", "APPLEJUICE", "LIMEJUICE", "HIBISCUS", "TAMARIND", "ALOE VERA", "BEETROOT", "TANGERINE", "GINGER PLAIN", "CARROT"], carrefour: ["ORANGE", "TROPICAL MIX", "MANGO", "PASSION", "APPLE GINGER", "TREE TOMATO", "PINEAPPLE MINT", "LIME & GINGER", "TAMARIND", "CARROT", "BEETROOT"] };

function handleJuiceTouch(e, step) {
  const el = e.currentTarget;
  if (e.type === 'touchmove') { el.hasScrolled = true; clearTimeout(el.pressTimer); return; }
  
  if (e.type === 'touchstart' || e.type === 'mousedown') { 
    el.hasScrolled = false;
    el.pressTimer = setTimeout(() => { 
      el.isLong = true; 
      if(navigator.vibrate) navigator.vibrate(50); 
      el.setAttribute('data-val', "0"); el.innerText = '-'; el.classList.remove('has-value'); 
    }, 400);
  } 
  else if (e.type === 'touchend' || e.type === 'mouseup') { 
    clearTimeout(el.pressTimer); 
    if (el.hasScrolled) return; 
    if (e.cancelable) e.preventDefault(); 
    
    if(!el.isLong) { 
      let currentVal = parseInt(el.getAttribute('data-val')) || 0; 
      currentVal += step; 
      if(currentVal > 60) currentVal = 0; 
      el.setAttribute('data-val', currentVal); el.innerText = currentVal === 0 ? '-' : currentVal; el.classList.toggle('has-value', currentVal > 0); 
      const flavor = el.getAttribute('data-flavor'), vol = el.getAttribute('data-vol'), otherVol = vol === '5L' ? '3L' : '5L'; 
      const otherEl = document.querySelector(`.juice-input[data-flavor="${flavor}"][data-vol="${otherVol}"]`); 
      if (currentVal > 0 && otherEl && parseInt(otherEl.getAttribute('data-val')) > 0) { 
        otherEl.setAttribute('data-val', 0); otherEl.innerText = '-'; otherEl.classList.remove('has-value'); 
      } 
    } 
    el.isLong = false; 
  } 
  else { clearTimeout(el.pressTimer); el.isLong = false; }
}

function renderDynamicOrderContent() {
  let html = `<details class="order-group"><summary class="order-group-title">Juice Flavors</summary><div class="order-group-content" style="padding:0; border-top:none;"><div style="overflow-x:auto;"><table><thead><tr><th>Flavor</th><th>5 Litres</th><th>3 Litres</th></tr></thead><tbody>`;
  JUICES[activeStore].forEach(flavor => { 
    html += `<tr><td class="flavor-name">${flavor}</td>`; 
    ["5L", "3L"].forEach(v => { 
      html += `<td><div class="square-input juice-input" data-flavor="${flavor}" data-vol="${v}" data-val="0" ontouchstart="handleJuiceTouch(event, ${parseInt(v)})" ontouchmove="handleJuiceTouch(event, 0)" ontouchend="handleJuiceTouch(event, ${parseInt(v)})" ontouchcancel="handleJuiceTouch(event, 0)" onmousedown="handleJuiceTouch(event, ${parseInt(v)})" onmouseup="handleJuiceTouch(event, ${parseInt(v)})" onmouseleave="handleJuiceTouch(event, 0)">-</div></td>`;

function initAppAtt() {
  purgeCacheAtMidnight(); 

  const myId = ++activeFetchId;
  const cacheKey = currentTerminal + '_portal_data';
  let cached = false;
  
  try {
    const raw = Storage.get(cacheKey);
    if (raw) { const p = JSON.parse(raw); if (p && Array.isArray(p.branches)) { staff = p.staff || []; branches = p.branches || []; populateBranches(branches); restoreUserState(); cached = true; } }
  } catch(e) {}
  
  fetchFromServer('getPortalData', {}).then(data => {
    if (myId !== activeFetchId) return;
    const changed = JSON.stringify(branches) !== JSON.stringify(data.branches) || JSON.stringify(staff) !== JSON.stringify(data.staff);
    staff = data.staff || []; branches = data.branches || [];
    try { Storage.set(cacheKey, JSON.stringify({staff, branches})); } catch(e) {}
    
    if (!cached || changed) { 
      populateBranches(branches); 
      if (!document.getElementById('staffID').value) {
        restoreUserState(); 
      }
    } 
  }).catch(() => {
    if (myId === activeFetchId && branches.length === 0) document.getElementById('branch').innerHTML = '<option value="">Offline — waiting for connection</option>';
  });
}

function doVerifyGPS(isRetry) {
  document.getElementById('gpsMsg').innerText = 'Locating…'; document.getElementById('gpsMsg').className = 'msg';
  if (!navigator.geolocation) { showError('gpsMsg','GPS not supported on this device.'); return; }
  navigator.geolocation.getCurrentPosition(
    pos => {
      coords = pos.coords; const b = branches.find(branch => branch[0] === document.getElementById('branch').value);
      if (!b) { showError('gpsMsg','Select branch first.'); return; }
      const R = 6371e3; const dLat = (b[1]-coords.latitude)*Math.PI/180; const dLon = (b[2]-coords.longitude)*Math.PI/180;
      const a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(coords.latitude*Math.PI/180)*Math.cos(b[1]*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
      const dist = R * 2 * Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
      const maxDist = isRetry ? 350 : 250;
      if (dist > maxDist) { if (!isRetry && navigator.onLine) { setTimeout(() => doVerifyGPS(true), 500); } else { showError('gpsMsg', dist>1000 ? `Too far (${(dist/1000).toFixed(1)}km)` : `Too far (${Math.round(dist)}m) — move closer`); } } 
      else { showSuccess('gpsMsg','Location Verified'); activateStep(4); }
    },
    err => { 
      if(err.code===1) { 
        showGuideModal('gps'); 
        showError('gpsMsg', 'Location Denied. Tap Verify again.');
      } else { 
        if (!isRetry && navigator.onLine) { 
          setTimeout(() => doVerifyGPS(true), 500); 
        } else { 
          showGuideModal('gps_signal'); 
          showError('gpsMsg', 'Weak Signal. Tap Verify again.');
        } 
      } 
    },
    {enableHighAccuracy:true, timeout:15000, maximumAge: isRetry ? 0 : 30000}
  );
}

function verifyGPS() {
  if (staffRestrictionError) {
    const msgEl = document.getElementById('staffMsg'); msgEl.style.opacity = '0';
    setTimeout(() => { showError('staffMsg', staffRestrictionError); msgEl.style.opacity = '1'; clearTimeout(warningTimer); warningTimer = setTimeout(() => { msgEl.style.opacity = '0'; setTimeout(() => { if(document.getElementById('step2').classList.contains('activeStep')) { showSuccess('staffMsg', `Welcome ${staffName}`); } msgEl.style.opacity = '1'; }, 300); }, 3000); }, 300); return;
  }
  doVerifyGPS(false);
}

function startCamera() {
  const btn = document.getElementById('openCameraBtn');
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) { showGuideModal('camera'); return; }

  btn.classList.add('loading');
  btn.innerHTML = '<span class="btn-spinner" style="display:inline-block; vertical-align:middle; width:16px; height:16px; margin-right:8px;"></span><span style="vertical-align:middle;">Starting...</span>';
  clearMsg('cameraMsg');

  const constraints = { video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } }, audio: false };
  navigator.mediaDevices.getUserMedia(constraints)
    .then(stream => {
      videoStream = stream; const video = document.getElementById('cameraVideo'); video.srcObject = stream;
      video.onloadedmetadata = () => { video.play().catch(()=>{}); document.getElementById('videoContainerWrapper').classList.add('expanded'); document.getElementById('cameraBackdrop').classList.add('show'); video.classList.add('live'); btn.classList.remove('loading'); btn.innerText = currentAction || 'Take Selfie'; };
    })
    .catch(err => { console.warn('Camera failed:', err); btn.classList.remove('loading'); btn.innerText = currentAction || 'Take Selfie'; showGuideModal('camera'); });
}

function capturePhoto() {
  const video = document.getElementById('cameraVideo'), wrapper = document.getElementById('videoContainerWrapper'); 
  const vw = video.videoWidth || 1280, vh = video.videoHeight || 720, cw = wrapper.offsetWidth, ch = wrapper.offsetHeight;
  const containerAspect = cw / ch, videoAspect = vw / vh;
  let sWidth, sHeight, startX, startY;
  
  if (videoAspect > containerAspect) { sHeight = vh; sWidth = vh * containerAspect; startX = (vw - sWidth) / 2; startY = 0; } 
  else { sWidth = vw; sHeight = vw / containerAspect; startX = 0; startY = (vh - sHeight) / 2; }
  
  const maxOutput = 720, scale = (sWidth > maxOutput || sHeight > maxOutput) ? (maxOutput / Math.max(sWidth, sHeight)) : 1;
  const canvas = document.createElement('canvas'); canvas.width = Math.round(sWidth * scale); canvas.height = Math.round(sHeight * scale);
  const ctx = canvas.getContext('2d');
  
  ctx.translate(canvas.width, 0); ctx.scale(-1, 1); ctx.imageSmoothingEnabled = true; ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(video, startX, startY, sWidth, sHeight, 0, 0, canvas.width, canvas.height);
  
  photo = canvas.toDataURL('image/jpeg', 0.85); document.getElementById('successPhoto').src = photo;
  stopCamera(); submitAttendanceRealtime();
}

function stopCamera() {
  const wrapper = document.getElementById('videoContainerWrapper'), backdrop = document.getElementById('cameraBackdrop');
  wrapper.classList.remove('expanded'); backdrop.classList.remove('show');
  const video = document.getElementById('cameraVideo'); video.classList.remove('live');
  const btn = document.getElementById('openCameraBtn'); if (btn && !btn.classList.contains('loading')) btn.textContent = currentAction || 'Take Selfie';
  
  setTimeout(() => { if (videoStream) { videoStream.getTracks().forEach(t => t.stop()); videoStream = null; } video.srcObject = null; }, 300);
}

// ----------------------------------------------------
// OFFLINE QUEUEING & INSTANT SUBMISSION SYSTEM
// ----------------------------------------------------
async function submitAttendanceRealtime() {
  const branch = document.getElementById('branch').value, staffID = document.getElementById('staffID').value;
  if (!branch || !staffID || !currentAction || !photo) return;

  Storage.set('last_staff_id_' + currentTerminal, staffID);
  
  const payload = { 
    name: staffName, id: staffID, branch: branch, action: currentAction, 
    image: photo, lat: coords ? coords.latitude : 0, lng: coords ? coords.longitude : 0, 
    clientTimestamp: new Date().toISOString() 
  };
  
  const submittedAction = currentAction;
  
  // 1. OPTIMISTIC LOCAL UPDATE (Prevents Multiple/Duplicate Submissions Instantly)
  const match = staff.find(s => s.id === staffID);
  if (match) {
    match.status = submittedAction;
    match.lastTime = Date.now();
    match.branch = branch;
    
    // Update the local cache so they are blocked even if they refresh the page
    try {
      const cacheKey = currentTerminal + '_portal_data';
      const cached = JSON.parse(Storage.get(cacheKey));
      if (cached && cached.staff) {
        const cachedMatch = cached.staff.find(s => s.id === staffID);
        if (cachedMatch) {
          cachedMatch.status = submittedAction;
          cachedMatch.lastTime = match.lastTime;
          cachedMatch.branch = branch;
          Storage.set(cacheKey, JSON.stringify(cached));
        }
      }
    } catch(e) {}
  }
  
  // 2. INSTANT SUCCESS FEEDBACK - User moves on instantly!
  finishSubmission(submittedAction);

  // 3. ATTEMPT IMMEDIATE UPLOAD IF ONLINE (Never stores if successful)
  if (navigator.onLine) {
    try {
      const res = await fetch(SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ action: 'recordAttendance', data: payload, terminal: currentTerminal })
      });
      const j = await res.json();
      
      // If fully successful OR server explicitly rejects it (e.g. Already clocked in),
      // we DO NOT store it offline. We just exit.
      if (j.ok || (j.error && !j.error.includes("busy"))) {
        return; 
      }
    } catch(err) {
      // Fetch failed / Network error -> Fall through to the offline queue
    }
  }

  // 4. STORE LOCALLY IF OFFLINE OR SERVER BUSY
  let queue = [];
  try { queue = JSON.parse(Storage.get('attendance_queue')) || []; } catch(e){}
  queue.push({ payload: payload, terminal: currentTerminal });
  Storage.set('attendance_queue', JSON.stringify(queue));
  
  // Try kicking off the background sync
  processAttendanceQueue();
}

let isAttQueueSyncing = false;
async function processAttendanceQueue() {
  if (isAttQueueSyncing || !navigator.onLine) return;
  
  let queue = [];
  try { queue = JSON.parse(Storage.get('attendance_queue')) || []; } catch(e){}
  if (queue.length === 0) return;

  // AUTO-CLEANUP: Drop any offline data older than 6 hours so it doesn't hog storage
  const now = Date.now();
  const maxAge = 6 * 60 * 60 * 1000; // 6 hours in milliseconds
  const initialLength = queue.length;
  queue = queue.filter(item => (now - new Date(item.payload.clientTimestamp).getTime()) < maxAge);
  
  if (queue.length !== initialLength) {
    Storage.set('attendance_queue', JSON.stringify(queue));
    if (queue.length === 0) return;
  }

  isAttQueueSyncing = true;

  while (queue.length > 0 && navigator.onLine) {
    const item = queue[0];
    try {
      const res = await fetch(SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ action: 'recordAttendance', data: item.payload, terminal: item.terminal })
      });
      const j = await res.json();
      
      // If the server explicitly says "Server is busy", we stop and try again on the next tick
      if (!j.ok && j.error && j.error.includes("busy")) {
        break; 
      }
      
      // Request successful OR explicitly rejected by business rules: Remove from local queue
      queue.shift();
      Storage.set('attendance_queue', JSON.stringify(queue));
      
    } catch (err) {
      // Network disconnected / timeout: Stop processing, retry next loop
      break; 
    }
  }
  
  isAttQueueSyncing = false;
}

// Check every 15 seconds silently in the background
setInterval(processAttendanceQueue, 15000);

// ----------------------------------------------------

function finishSubmission(action) {
  const firstName = staffName.split(' ')[0] || staffName;
  const hrs = new Date().getHours(), mins = new Date().getMinutes(), timeVal = hrs + (mins / 60.0);
  let msg='';

  if (action === 'Clock In') {
    if (timeVal < 6.5)        { msg="Fantastic start — you're early today! Keep it up."; }
    else if (timeVal <= 7.66) { msg="Great, you are on time for the morning shift."; }
    else if (timeVal < 11.0)  { msg="Note: Late for morning shift."; }
    else if (timeVal < 14.0)  { msg="Early for the second shift. Great job!"; }
    else if (timeVal <= 14.66){ msg="On time for the second shift. Have a productive afternoon!"; }
    else                      { msg="Note: Late for afternoon shift."; }
  } else {
    if (hrs < 16) { msg="Have a wonderful afternoon!"; } else { msg="Have a restful night!"; }
    if (hrs >= 18) { msg += " And remember to place your order."; }
  }

  document.getElementById('successBadge').textContent = action.toUpperCase();
  document.getElementById('successName').textContent = firstName;
  document.getElementById('successMsg').textContent = msg;
  
  document.getElementById('attMainContainer').style.overflow = 'visible';
  document.getElementById('attMainForm').style.display = 'none';
  document.getElementById('attSuccessScreen').style.display = 'flex';
}
