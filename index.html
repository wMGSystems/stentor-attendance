<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover">
<title>Store Attendance</title>
<style>
/* CSS Reset and Variables */
:root {
  --bg-primary:#ffffff; --text-primary:#111827; --border-color:#e5e7eb;
  --success-color:#10b981; --error-color:#ef4444; --theme-chan:#10b981; 
  --theme-carr:#3b82f6; --dynamic-primary:var(--theme-chan);
}
@media (prefers-color-scheme:dark) {
  :root { --bg-primary:#1f2937; --text-primary:#f9fafb; --border-color:#374151; }
}
body {
  font-family: -apple-system, system-ui; background: var(--dynamic-primary);
  margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh;
}
.container {
  width: 90%; max-width: 400px; background: var(--bg-primary); border-radius: 24px;
  padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); position: relative;
}
/* Steps and Inputs */
.step { opacity: 0.15; pointer-events: none; transition: 0.3s; margin-bottom: 15px; }
.step.active { opacity: 1; pointer-events: auto; }
label { font-size: 11px; font-weight: 700; text-transform: uppercase; color: #6b7280; display: block; margin-bottom: 5px; }
input, select, button {
  width: 100%; height: 48px; border-radius: 12px; border: 1px solid var(--border-color);
  font-size: 16px; padding: 0 12px; outline: none; background: #f9fafb;
}
button { background: #eff6ff; color: var(--dynamic-primary); font-weight: 700; cursor: pointer; border: none; }
button:disabled { opacity: 0.5; }
.msg { font-size: 12px; margin-top: 5px; min-height: 15px; }
.msg.error { color: var(--error-color); }
.msg.success { color: var(--success-color); }

/* Camera Overlay */
#videoWrapper {
  position: fixed; inset: 0; background: #000; z-index: 100; display: none;
  flex-direction: column; align-items: center; justify-content: center;
}
video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
#captureBtn {
  position: absolute; bottom: 40px; width: 70px; height: 70px; border-radius: 50%;
  border: 5px solid #fff; background: rgba(255,255,255,0.3);
}

/* Loading Spinner */
.spinner {
  border: 3px solid rgba(0,0,0,0.1); border-top-color: var(--dynamic-primary);
  border-radius: 50%; width: 20px; height: 20px; animation: spin 0.8s linear infinite;
  display: inline-block; margin-right: 8px; vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

#successScreen { display: none; text-align: center; }
.success-photo { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 4px solid var(--success-color); margin-bottom: 15px; }
</style>
</head>
<body class="theme-chandarana">

<div class="container">
  <div id="mainForm">
    <h2 id="title" style="text-align:center; color:var(--dynamic-primary)">Chandarana</h2>
    
    <div id="step1" class="step active">
      <label>Branch</label>
      <select id="branch"><option>Connecting to server...</option></select>
    </div>

    <div id="step2" class="step">
      <label>Staff ID</label>
      <input id="staffID" type="tel" placeholder="Enter ID">
      <div id="staffMsg" class="msg"></div>
    </div>

    <div id="step3" class="step">
      <label>Location</label>
      <button id="gpsBtn" onclick="verifyGPS()">Verify Location</button>
      <div id="gpsMsg" class="msg"></div>
    </div>

    <div id="step4" class="step">
      <label>Identity</label>
      <button id="camBtn" onclick="openCam()">Take Selfie & Submit</button>
      <div id="camMsg" class="msg"></div>
    </div>
  </div>

  <div id="successScreen">
    <img id="resPhoto" class="success-photo">
    <h2 id="resName" style="margin:5px 0; color:var(--dynamic-primary)"></h2>
    <p id="resMsg" style="color:#4b5563; line-height:1.4"></p>
    <button onclick="location.reload()" style="margin-top:20px">Done</button>
  </div>
</div>

<div id="videoWrapper">
  <video id="video" autoplay playsinline></video>
  <div id="captureBtn" onclick="capture()"></div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbyOHinnhI5ORDdxxm4pJuMvETZWfZm2PqN6w5bp-Kxn6YMwsr_mHzbu3js8v6kTVAHkCA/exec"; // REPLACE THIS
let currentTerminal = "chandarana";
let staff = [], branches = [], coords = null, user = null, photo = null;

async function api(action, data) {
  const resp = await fetch(URL, {
    method: "POST",
    body: JSON.stringify({ action, data, terminal: currentTerminal })
  });
  const json = await resp.json();
  if (!json.ok) throw new Error(json.error);
  return json.data;
}

// Start warming up the server connection immediately
async function init() {
  try {
    const data = await api("getPortalData", {});
    staff = data.staff;
    branches = data.branches;
    
    const sel = document.getElementById('branch');
    sel.innerHTML = '<option value="">Select Branch</option>' + 
      branches.map(b => `<option value="${b[0]}">${b[0]}</option>`).join('');
    sel.onchange = () => { if(sel.value) activate(2); };
  } catch (e) {
    alert("Connection Error. Please check your internet.");
  }
}

function activate(n) { document.getElementById('step'+n).classList.add('active'); }

document.getElementById('staffID').oninput = function() {
  const val = this.value.trim();
  const msg = document.getElementById('staffMsg');
  user = staff.find(s => s.id === val);
  
  if (user) {
    const now = Date.now();
    // 3 HOUR RULE LOGIC
    if (user.lastAction === "Clock In") {
      const diffHours = (now - user.lastTime) / (1000 * 60 * 60);
      if (diffHours < 3) {
        msg.className = "msg error";
        msg.innerText = "Clock out at the end of your shift";
        return;
      }
      user.nextAction = "Clock Out";
    } else if (user.lastAction === "Clock Out") {
      msg.className = "msg error";
      msg.innerText = "You have already clocked in";
      return;
    } else {
      user.nextAction = "Clock In";
    }
    
    msg.className = "msg success";
    msg.innerText = "Verified: " + user.name;
    activate(3);
  } else {
    msg.innerText = "";
  }
};

function verifyGPS() {
  const btn = document.getElementById('gpsBtn');
  const msg = document.getElementById('gpsMsg');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Locating...';

  navigator.geolocation.getCurrentPosition(p => {
    coords = p.coords;
    msg.className = "msg success";
    msg.innerText = "Location locked";
    btn.innerHTML = "Location Verified";
    activate(4);
  }, () => {
    alert("Please enable GPS/Location access.");
    btn.disabled = false;
    btn.innerHTML = "Verify Location";
  }, { enableHighAccuracy: true });
}

let stream;
async function openCam() {
  stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
  document.getElementById('video').srcObject = stream;
  document.getElementById('videoWrapper').style.display = 'flex';
}

async function capture() {
  const video = document.getElementById('video');
  const canvas = document.createElement('canvas');
  canvas.width = 400; canvas.height = 400;
  const ctx = canvas.getContext('2d');
  ctx.translate(400, 0); ctx.scale(-1, 1);
  ctx.drawImage(video, 0, 0, 400, 400);
  photo = canvas.toDataURL('image/jpeg', 0.7);
  
  stream.getTracks().forEach(t => t.stop());
  document.getElementById('videoWrapper').style.display = 'none';
  
  submit();
}

async function submit() {
  const btn = document.getElementById('camBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Uploading to Server...';
  
  try {
    const payload = {
      name: user.name, id: user.id, branch: document.getElementById('branch').value,
      action: user.nextAction, image: photo, lat: coords.latitude, lng: coords.longitude
    };
    
    await api("recordAttendance", payload);
    
    // ONLY SHOW SUCCESS AFTER TRANSMISSION
    document.getElementById('mainForm').style.display = 'none';
    document.getElementById('resPhoto').src = photo;
    document.getElementById('resName').innerText = user.name.split(' ')[0];
    document.getElementById('resMsg').innerText = user.nextAction === "Clock In" ? 
      "Attendance recorded. Have a great shift!" : "Clock out successful. See you next time!";
    document.getElementById('successScreen').style.display = 'block';
    
  } catch (e) {
    alert("Error: " + e.message);
    btn.disabled = false;
    btn.innerHTML = "Retry Submission";
  }
}

init();
</script>
</body>
</html>
