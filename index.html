<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stentor Attendance - Select Branch</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', Tahoma, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.container {
  background: white;
  border-radius: 20px;
  padding: 40px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
  max-width: 500px;
  text-align: center;
}

h1 {
  color: #1a1a1a;
  margin-bottom: 10px;
  font-size: 28px;
}

.subtitle {
  color: #666;
  margin-bottom: 40px;
  font-size: 14px;
}

.buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

.btn {
  padding: 20px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  text-decoration: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  transition: all 0.3s ease;
}

.btn-chandarana {
  background: linear-gradient(135deg, #a8e6d8, #6bb6ff);
  color: #1a1a1a;
}

.btn-chandarana:hover {
  transform: translateY(-5px);
  box-shadow: 0 10px 30px rgba(168, 230, 216, 0.3);
}

.btn-carrefour {
  background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
  color: white;
}

.btn-carrefour:hover {
  transform: translateY(-5px);
  box-shadow: 0 10px 30px rgba(255, 107, 107, 0.3);
}

.icon {
  font-size: 32px;
}

.label {
  font-size: 16px;
  font-weight: 700;
}

.divider {
  margin: 30px 0;
  color: #ddd;
  font-size: 12px;
}

footer {
  margin-top: 30px;
  padding-top: 20px;
  border-top: 1px solid #eee;
  font-size: 12px;
  color: #999;
}

@media (max-width: 480px) {
  .container {
    padding: 30px 20px;
  }
  
  .buttons {
    grid-template-columns: 1fr;
  }
  
  h1 {
    font-size: 24px;
  }
}
</style>
</head>

<body>

<div class="container">
  <h1>🏢 Stentor Attendance</h1>
  <p class="subtitle">Select your branch</p>
  
  <div class="buttons">
    <a href="./chandarana/" class="btn btn-chandarana">
      <span class="icon">🌟</span>
      <span class="label">Chandarana</span>
    </a>
    <a href="./carrefour/" class="btn btn-carrefour">
      <span class="icon">🏪</span>
      <span class="label">Carrefour</span>
    </a>
  </div>
  
  <div class="divider">OR</div>
  
  <footer>
    Select your branch to continue to attendance tracking
  </footer>
</div>

</body>
</html>
