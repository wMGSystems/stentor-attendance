<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" id="theme-color-meta" content="#059669">
<script>
  (function() {
    try {
      let savedTerm = localStorage.getItem('selected_terminal') || 'chandarana';
      let isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      let meta = document.getElementById('theme-color-meta');
      if (meta) {
        if (savedTerm === 'carrefour') meta.setAttribute('content', isDark ? '#2563eb' : '#3b82f6');
        else meta.setAttribute('content', isDark ? '#059669' : '#10b981');
      }
    } catch(e) {}
  })();
</script>
<title>Store Attendance</title>
<style>
:root {
  --bg-primary:#ffffff; --bg-secondary:#f7f9fa;
  --text-primary:#111827; --text-secondary:#4b5563; --text-tertiary:#9ca3af;
  --border-color:#e5e7eb; --input-bg:#f9fafb; --input-border:#d1d5db;
  --button-secondary-bg:#eff6ff;
  --success-color:#10b981; --error-color:#ef4444;
  --warning-bg:#fef2f2; --warning-border:#fecaca; --warning-text:#b91c1c;
  --success-card-bg:#f0fdf4; --success-card-border:#bbf7d0;
  --modal-overlay:rgba(0,0,0,0.65); --shadow-color:rgba(0,0,0,0.1);
  --label-text:#6b7280;
  
  --theme-chan:#10b981; 
  --theme-carr:#3b82f6; 
  --dynamic-primary:var(--theme-chan);
}

@media (prefers-color-scheme:dark) {
  :root {
    --bg-primary:#1f2937; --bg-secondary:#111827;
    --text-primary:#f9fafb; --text-secondary:#d1d5db; --text-tertiary:#9ca3af;
    --border-color:#374151; --input-bg:#374151; --input-border:#4b5563;
    --button-secondary-bg:#1e3a8a;
    --success-color:#34d399; --error-color:#f87171;
    --warning-bg:#450a0a; --warning-border:#7f1d1d; --warning-text:#fca5a5;
    --success-card-bg:#064e3b; --success-card-border:#065f46;
    --modal-overlay:rgba(0,0,0,0.85); --shadow-color:rgba(0,0,0,0.5);
    --label-text:#9ca3af;
    
    --theme-chan:#059669; 
    --theme-carr:#2563eb; 
  }
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body {
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
  color:var(--text-primary); 
  background-color: var(--dynamic-primary);
  min-height:100dvh; 
  display:flex; flex-direction:column;
  align-items:center; 
  justify-content:center; 
  padding:env(safe-area-inset-top) 12px env(safe-area-inset-bottom); 
  overflow-y:auto; -webkit-overflow-scrolling:touch;
  transition: background-color 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

body.theme-chandarana{--dynamic-primary:var(--theme-chan)}
body.theme-carrefour {--dynamic-primary:var(--theme-carr);--success-color:#3b82f6}

/* APP WRAPPER FOR EXACT CENTERING */
.app-wrapper {
  position: relative;
  width: 100%;
  max-width: 420px; /* Increased max width slightly to allow larger inputs */
  display: flex;
  align-items: center;
  justify-content: center;
}

/* METAL RODS HANGING SIGN */
.hanging-sign-wrapper {
  position: absolute;
  bottom: 100%;
  left: 50%;
  transform: translateX(-50%);
  margin-bottom: 15px; 
  perspective: 800px;
  z-index: 10;
  width: 240px; 
}
.chain {
  position: absolute;
  top: -30px;
  width: 5px;
  height: 34px;
  background: linear-gradient(to right, #9ca3af, #f3f4f6, #9ca3af);
  border-radius: 3px;
  box-shadow: inset 0 0 3px rgba(0,0,0,0.3), 0 2px 4px rgba(0,0,0,0.2);
  z-index: 1; 
}
.chain::before {
  content: ''; position: absolute; top: -6px; left: -3.5px;
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--dynamic-primary); 
  border: 3.5px solid #d1d5db; 
  box-shadow: 0 8px 12px rgba(0,0,0,0.6), 0 3px 6px rgba(0,0,0,0.4), inset 0 2px 4px rgba(0,0,0,0.7);
  box-sizing: border-box;
  transition: background 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}
.left-chain { left: 40px; }
.right-chain { right: 40px; }

.hanging-sign {
  background: var(--bg-primary);
  color: var(--dynamic-primary);
  padding: 12px 10px;
  border-radius: 12px;
  font-weight: 900;
  font-size: 20px;
  text-transform: uppercase;
  letter-spacing: 2px;
  text-align: center;
  width: 100%;
  display: block;
  box-sizing: border-box;
  box-shadow: 0 10px 25px var(--shadow-color), inset 0 -3px 0 rgba(0,0,0,0.05);
  transform-origin: top center;
  transition: color 0.4s ease;
  position: relative;
  z-index: 2; 
}

@keyframes swing {
  0%   { transform: rotateX(0deg) rotateZ(0deg); }
  20%  { transform: rotateX(25deg) rotateZ(-3deg); }
  40%  { transform: rotateX(-15deg) rotateZ(2deg); }
  60%  { transform: rotateX(8deg) rotateZ(-1deg); }
  80%  { transform: rotateX(-3deg) rotateZ(0deg); }
  100% { transform: rotateX(0deg) rotateZ(0deg); }
}
.hanging-sign.nudge { animation: swing 0.7s cubic-bezier(0.25, 1, 0.5, 1); }

.container{
  width:100%; 
  aspect-ratio: 4 / 5.2; /* Taller aspect ratio for a bigger box */
  min-height: 520px;
  margin:0 auto; background:var(--bg-primary);
  padding:32px 24px; border-radius:24px; /* Generous padding */
  box-shadow:0 15px 35px var(--shadow-color);
  position:relative; overflow:hidden;
  display:flex; flex-direction:column; justify-content:center; 
}

#mainForm { width: 100%; }

.network-indicator{
  position:absolute;top:18px;left:18px;width:8px;height:8px;border-radius:50%;
  background:var(--success-color);opacity:0.8;transition:background 0.4s ease;
  box-shadow: 0 0 6px var(--success-color);
}
.network-indicator.offline{background:var(--text-tertiary);opacity:0.4; box-shadow:none;}

.top-bar{display:flex;justify-content:flex-end;margin-bottom:30px} /* More breathing room below top bar */
.terminal-pill-wrapper{
  position:relative;display:inline-flex;background:var(--input-bg);
  border:1px solid var(--border-color);border-radius:50px;padding:4px;height:44px; /* Taller pill */
  box-shadow:inset 0 2px 4px rgba(0,0,0,0.04);align-items:center;
}
.pill-slider{
  position:absolute;top:4px;bottom:4px;left:4px;border-radius:50px;
  background:var(--dynamic-primary);box-shadow:0 2px 6px rgba(0,0,0,0.15);
  transition:all 0.35s cubic-bezier(0.25,1,0.5,1);z-index:1;
}
.pill-btn{
  position:relative;z-index:2;background:transparent;border:none;
  padding:0 16px;height:100%;font-size:14px;font-weight:700;
  color:var(--text-secondary);cursor:pointer;transition:color 0.2s ease;
  display:flex;align-items:center;justify-content:center; outline:none;
  -webkit-tap-highlight-color:transparent;
}
.pill-btn.active{color:#fff;}
.pill-btn .full-text,.pill-btn .short-text{display:none}
.pill-btn.active .full-text{display:block}
.pill-btn:not(.active) .short-text{display:block}

@keyframes bounceIn{ 
  0%{transform:scale(0.9);opacity:0} 
  60%{transform:scale(1.05)} 
  100%{transform:scale(1);opacity:1} 
}
@keyframes spin{ to { transform: rotate(360deg); } }

/* Reverted back to grid layout but with MUCH larger gaps */
.step-grid{display:grid;grid-template-columns:1fr 1fr;gap:28px 16px}
.step{opacity:0.3;pointer-events:none;transition:opacity 0.4s ease}
.step.activeStep{opacity:1;pointer-events:auto;animation:bounceIn 0.45s ease}

/* Enlarged text and inputs to maximize space usage */
label{font-weight:600;font-size:13px;display:block;margin-bottom:10px;color:var(--label-text);text-transform:uppercase;letter-spacing:0.5px}
input,select{
  width:100%;height:52px;padding:0 16px;border-radius:14px;
  border:1px solid var(--input-border);font-size:16px;background:var(--input-bg);
  color:var(--text-primary);transition:all 0.2s; -webkit-appearance:none; outline:none;
}
input:focus,select:focus{border-color:var(--dynamic-primary);background:var(--bg-primary);box-shadow:0 0 0 3px rgba(16, 185, 129, 0.1)}
body.theme-carrefour input:focus, body.theme-carrefour select:focus {box-shadow:0 0 0 3px rgba(59, 130, 246, 0.1)}

button{
  width:100%;height:52px;border-radius:14px;border:none; font-size:15px;font-weight:700;
  background:var(--button-secondary-bg);color:var(--dynamic-primary);
  cursor:pointer;transition:transform 0.1s, opacity 0.2s, background 0.2s;
}
button:active{transform:scale(0.97)}
button:disabled{opacity:0.5;cursor:not-allowed;transform:none}

.btn-spinner {
  border: 2px solid rgba(0,0,0,0.1); 
  border-top-color: currentColor; border-radius: 50%; 
  animation: spin 0.6s linear infinite;
}

#videoContainerWrapper{
  position:absolute; top:0; left:0; right:0; bottom:0;
  width:100%; height:100%; border-radius:24px;
  overflow:hidden; z-index:60; background-color: #000;
  transition: opacity 0.3s ease, transform 0.35s cubic-bezier(0.25, 1, 0.4, 1);
  transform: scale(0.95); opacity:0; pointer-events:none;
}
#videoContainerWrapper.expanded{ pointer-events:auto; opacity:1; transform: scale(1); }

#cameraVideo{ 
  position:absolute; top:0; left:0; width:100%; height:100%;
  object-fit:cover; display:block; transform: scaleX(-1); 
  opacity: 0; transition: opacity 0.4s ease; 
}
#cameraVideo.live { opacity: 1; }

/* Clicking the backdrop will now dismiss the camera entirely */
#cameraBackdrop{ display:none;position:fixed;inset:0;z-index:59; background: rgba(0,0,0,0.65); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
#cameraBackdrop.show{ display:block; }

.camera-ui{
  position:absolute;bottom:0;left:0;right:0; padding:24px;
  background:linear-gradient(to top,rgba(0,0,0,0.7) 0%,transparent 100%);
  display:flex;align-items:center;justify-content:center; z-index:3;
}
#captureBtn{
  width:68px;height:68px;border-radius:50%;
  background:rgba(255,255,255,0.3);border:4px solid rgba(255,255,255,0.95);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:transform 0.1s;-webkit-tap-highlight-color:transparent;
}
#captureBtn::after{content:'';width:50px;height:50px;background:#fff;border-radius:50%;transition:transform 0.1s}
#captureBtn:active{transform:scale(0.88)}
#captureBtn:active::after{transform:scale(0.9)}

/* Adjusted error/success messaging space */
.msg{ 
  font-size:13px;font-weight:600;margin-top:8px;
  min-height:42px; align-items:flex-start; line-height:1.4;
  color:var(--text-tertiary);display:flex; 
  transition: opacity 0.3s ease, color 0.3s ease; opacity: 1;
}
.msg.success{color:var(--success-color);font-size:14px}
.msg.error  {color:var(--error-color)}
.msg .dot{
  display:inline-flex;justify-content:center;align-items:center;
  width:16px;height:16px;background:var(--success-color);border-radius:50%;
  margin-right:8px;flex-shrink:0;position:relative; margin-top: 2px; 
}
.msg .dot::after{
  content:'';position:absolute;top:45%;left:50%; width:3.5px;height:7px;
  border-right:2px solid #fff;border-bottom:2px solid #fff;
  transform:translate(-50%,-50%) rotate(45deg);
}

#successScreen{ display:none;flex-direction:column;align-items:center; justify-content:center; padding:10px 4px;text-align:center;width:100%; }

.success-photo{
  width: 120px; height: 120px; object-fit: cover; border-radius: 50%;
  box-shadow: 0 0 0 4px var(--success-color); margin-bottom: 20px;
  animation: bounceIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
  transition: transform 0.4s cubic-bezier(0.25, 1, 0.4, 1), border-radius 0.4s cubic-bezier(0.25, 1, 0.4, 1), box-shadow 0.4s ease;
  cursor: zoom-in; position: relative; z-index: 20000; -webkit-tap-highlight-color: transparent;
}
.success-photo.zoomed {
  transform: scale(2.6); border-radius: 8%;
  box-shadow: 0 0 0 1.5px var(--success-color), 0 10px 30px rgba(0,0,0,0.3);
  cursor: zoom-out;
}

#photoBackdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  z-index: 19999; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
}
#photoBackdrop.show { opacity: 1; pointer-events: auto; }

.success-badge{
  background:var(--dynamic-primary);color:#fff;font-size:14px;font-weight:800;
  text-transform:uppercase;padding:8px 24px;border-radius:999px;
  margin-bottom:24px;display:inline-block;box-shadow:0 4px 10px rgba(0,0,0,0.1);
  animation:bounceIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) 0.05s backwards;
}
.success-card{
  background:var(--success-card-bg);border:1px solid var(--success-card-border);
  border-radius:20px;padding:24px 20px;width:100%;margin-bottom:20px;
  animation:bounceIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) 0.1s backwards;
}
.success-name{font-size:26px;font-weight:800;color:var(--dynamic-primary);margin-bottom:8px}
.success-msg {font-size:15px;font-weight:600;color:var(--text-secondary);line-height:1.5}
.success-back{
  width:100%;height:52px;background:var(--button-secondary-bg);
  color:var(--dynamic-primary);border:none;border-radius:14px;
  font-size:15px;font-weight:700;cursor:pointer;
}

#guideModal{
  display:none;position:fixed;inset:0;background:var(--modal-overlay);
  z-index:19999;flex-direction:column;align-items:center;justify-content:center;
  padding:20px;backdrop-filter:blur(5px); -webkit-backdrop-filter:blur(5px);
}
#guideModal .modal-box{
  background:var(--bg-primary);padding:28px;border-radius:20px;
  text-align:center;max-width:340px;width:100%; box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}
#guideModal .modal-box h3{color:var(--error-color);margin:10px 0 16px;font-size:20px}
.modal-instructions{
  background:var(--input-bg);color:var(--text-secondary);
  padding:16px;border-radius:12px;margin-bottom:18px;
  font-size:14px;line-height:1.6;text-align:left; border: 1px solid var(--border-color);
}
</style>
</head>

<body class="theme-chandarana">
<script>
const Storage={
  set: (k,v) => { try{ localStorage.setItem(k,v) }catch(e){} },
  get: (k)   => { try{ return localStorage.getItem(k) }catch(e){ return null } },
  remove: (k)=> { try{ localStorage.removeItem(k) }catch(e){} }
};
(() => { document.body.className = 'theme-' + (Storage.get('selected_terminal') || 'chandarana'); })();
</script>

<!-- Tapping outside the video area entirely drops the camera -->
<div id="cameraBackdrop" onclick="stopCamera()"></div>

<div class="app-wrapper">
  <!-- HANGING METAL RODS SIGN -->
  <div class="hanging-sign-wrapper" id="signWrapper">
    <div class="chain left-chain"></div>
    <div class="chain right-chain"></div>
    <div class="hanging-sign nudge" id="storeSign">Chandarana</div>

  <div class="container" id="mainContainer">
    <div id="networkIndicator" class="network-indicator"></div>

    </button>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyOHinnhI5ORDdxxm4pJuMvETZWfZm2PqN6w5bp-Kxn6YMwsr_mHzbu3js8v6kTVAHkCA/exec"; // ADD YOUR URL HERE

let currentTerminal = Storage.get('selected_terminal') || 'chandarana';
let staff = [], branches = [], coords = null, staffName = "", photo = null;
let activeFetchId = 0, currentAction = "", videoStream = null;

let staffRestrictionError = null; 
let warningTimer = null; 

document.addEventListener('DOMContentLoaded', () => {
  updateTerminalUI(); checkNetworkStatus(); initApp();
  if (window.matchMedia) window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', updateTerminalUI);
});
window.addEventListener('online', checkNetworkStatus);
window.addEventListener('offline', checkNetworkStatus);

function checkNetworkStatus() {
  document.getElementById('networkIndicator').classList.toggle('offline', !navigator.onLine);
}

function triggerSignAnimation() {
  const sign = document.getElementById('storeSign');
  if (sign) {
      sign.classList.remove('nudge');
      void sign.offsetWidth; 
      sign.classList.add('nudge');
  }
}

function updateTerminalUI() {
  document.body.className = `theme-${currentTerminal}`;
  const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  const hexColor = currentTerminal === 'chandarana' ? (isDark ? '#059669' : '#10b981') : (isDark ? '#2563eb' : '#3b82f6');
  
  const meta = document.getElementById('theme-color-meta');
  if (meta) meta.setAttribute('content', hexColor);
  
  const title = document.getElementById('storeSign');
  title.innerText = currentTerminal.charAt(0).toUpperCase() + currentTerminal.slice(1);
  triggerSignAnimation();
  
  document.getElementById('btn-chandarana').classList.toggle('active', currentTerminal === 'chandarana');
  document.getElementById('btn-carrefour').classList.toggle('active',  currentTerminal === 'carrefour');
  
  setTimeout(() => {
    const ab = document.querySelector('.pill-btn.active');
    const sl = document.getElementById('pillSlider');
    if (ab && sl) { sl.style.width = ab.offsetWidth + 'px'; sl.style.left = ab.offsetLeft + 'px'; }
  }, 10);
}

function switchTerminal(term) {
  if (currentTerminal === term) { triggerSignAnimation(); return; }
  currentTerminal = term; Storage.set('selected_terminal', term);
  staff = []; branches = [];
  document.getElementById('branch').innerHTML = '<option value="">Loading...</option>';
  
  document.getElementById('successScreen').style.display = 'none';
  document.getElementById('mainForm').style.display = 'block';
  document.getElementById('mainContainer').style.overflow = 'hidden';
  
  updateTerminalUI(); 
  resetStepsFrom(2); 
  initApp();
}

function fetchFromServer(action, data) {
  return fetch(APPS_SCRIPT_URL, {
    method:'POST', headers:{'Content-Type':'text/plain'},
    body:JSON.stringify({action:action, data:data, terminal:currentTerminal})
  }).then(r => r.json())
    .then(j => { if(!j.ok) throw new Error(j.error||'Server error'); return j.data; });
}

function populateBranches(list) {
  if (!Array.isArray(list)) return;
  const options = '<option value="">Choose Branch</option>' + list.map(b => `<option value="${b[0]}">${b[0]}</option>`).join('');
  document.getElementById('branch').innerHTML = options;
}

function restoreUserState() {
  const savedBranch = Storage.get('last_branch_' + currentTerminal);
  if (savedBranch) { 
    const branchEl = document.getElementById('branch');
    branchEl.value = savedBranch; 
    if (branchEl.value) handleBranchChange(); 
  }
  
  const savedStaffID = Storage.get('last_staff_id_' + currentTerminal);
  if (savedStaffID && staff.length > 0) {
    const staffEl = document.getElementById('staffID');
    staffEl.value = savedStaffID;
    handleStaffInput.call(staffEl);
  }
}

function initApp() {
  const myId = ++activeFetchId;
  const cacheKey = currentTerminal + '_portal_data';
  let cached = false;
  
  try {
    const raw = Storage.get(cacheKey);
    if (raw) { 
        const p = JSON.parse(raw); 
        if (p && Array.isArray(p.branches)) { 
            staff = p.staff || []; branches = p.branches || []; 
            populateBranches(branches); 
            restoreUserState(); 
            cached = true; 
        } 
    }
  } catch(e) {}
  
  fetchFromServer('getPortalData', {}).then(data => {
    if (myId !== activeFetchId) return;
    const changed = JSON.stringify(branches) !== JSON.stringify(data.branches) || JSON.stringify(staff) !== JSON.stringify(data.staff);
    staff = data.staff || []; branches = data.branches || [];
    try { Storage.set(cacheKey, JSON.stringify({staff, branches})); } catch(e) {}
    
    if (!cached || changed) { populateBranches(branches); restoreUserState(); }
    else { restoreUserState(); } 
  }).catch(() => {
    if (myId === activeFetchId && branches.length === 0)
      document.getElementById('branch').innerHTML = '<option value="">Offline — waiting for connection</option>';
  });
}

function activateStep(n) { document.getElementById('step'+n).classList.add('activeStep'); }
function resetStepsFrom(n) {
  for (let i = n; i <= 4; i++) { 
    const el = document.getElementById('step'+i); 
    if (el) el.classList.remove('activeStep'); 
  }
  if (n <= 2) { staffName = ''; document.getElementById('staffID').value = ''; clearMsg('staffMsg'); staffRestrictionError = null; }
  if (n <= 3) { coords = null; clearMsg('gpsMsg'); }
  if (n <= 4) {
    photo = null; stopCamera(); clearMsg('cameraMsg');
    document.getElementById('successPhoto').src = '';
  }
}

function resetToStart() {
  document.getElementById('successScreen').style.display='none';
  document.getElementById('mainForm').style.display='block';
  document.getElementById('mainContainer').style.overflow = 'hidden';
  document.getElementById('successPhoto').classList.remove('zoomed');
  document.getElementById('photoBackdrop').classList.remove('show');
  
  resetStepsFrom(3); 
  handleBranchChange();
  
  initApp();
  
  const staffEl = document.getElementById('staffID');
  if (staffEl.value) { handleStaffInput.call(staffEl); }
}

function showSuccess(id,txt){ const e=document.getElementById(id); e.innerHTML=`<span class="dot"></span> ${txt}`; e.className='msg success'; }
function showError(id,txt)  { const e=document.getElementById(id); e.innerText=txt; e.className='msg error'; }
function clearMsg(id)       { const e=document.getElementById(id); e.innerText=''; e.className='msg'; }

function toggleZoom() {
  const img = document.getElementById('successPhoto');
  const backdrop = document.getElementById('photoBackdrop');
  if (img.classList.contains('zoomed')) {
    img.classList.remove('zoomed');
    backdrop.classList.remove('show');
  } else {
    img.classList.add('zoomed');
    backdrop.classList.add('show');
  }
}

function handleBranchChange() {
  const val = document.getElementById('branch').value;
  if (!val) { 
    resetStepsFrom(2); 
    clearMsg('branchMsg'); 
    return; 
  }
  
  Storage.set('last_branch_' + currentTerminal, val);
  showSuccess('branchMsg', 'Branch Selected');
  
  if (document.getElementById('step2').classList.contains('activeStep') && document.getElementById('staffID').value !== '') {
    resetStepsFrom(2);
  }
  if (!document.getElementById('step2').classList.contains('activeStep')) {
    activateStep(2);
  }
}
document.getElementById('branch').onchange = handleBranchChange;

function handleStaffInput() {
  const val = this.value.trim();
  staffRestrictionError = null; 
  if (val.length < 2) { resetStepsFrom(3); clearMsg('staffMsg'); return; }
  
  const match = staff.find(s => s.id === val);
  
  if (match) {
    staffName = match.name;
    const lastAction = match.status; 
    const lastTime = match.lastTime;

    if (lastAction === 'Clock Out') {
      staffRestrictionError = 'You have already clocked in and out today.';
    } else if (lastAction === 'Clock In') {
      if (lastTime && (Date.now() - lastTime) / (1000 * 60 * 60) < 3) {
        staffRestrictionError = 'Clock out at the end of your shift.';
      }
      currentAction = 'Clock Out';
    } else {
      currentAction = 'Clock In';
    }
    
    const msgEl = document.getElementById('staffMsg');
    msgEl.style.opacity = '1';
    showSuccess('staffMsg', `Welcome ${staffName}`);
    
    if (document.getElementById('step4').classList.contains('activeStep')) resetStepsFrom(4);
    if (!document.getElementById('step3').classList.contains('activeStep')) activateStep(3);
  } else {
    resetStepsFrom(3); showError('staffMsg','Invalid Staff ID. Please check.');
  }
}
document.getElementById('staffID').oninput = handleStaffInput;

function showGuideModal(type) {
  const modal=document.getElementById('guideModal'), title=document.getElementById('guideTitle'),
        text=document.getElementById('guideText'),   icon=document.getElementById('guideIcon');
        
  if (type==='gps') {
    icon.textContent='📍'; title.textContent='Location Blocked'; title.style.color='var(--error-color)';
    text.innerHTML='<p>We need your location to verify you are at the branch.</p>'
      +'<p style="margin-top:8px"><strong>🍎 iPhone:</strong><br>Settings → Privacy & Security → Location Services → Allow Safari/Chrome.</p>'
      +'<p style="margin-top:8px"><strong>🤖 Android:</strong><br>⋮ Menu → Settings → Site settings → Location → Allow.</p>'
      +'<p style="margin-top:12px; color:var(--error-color); font-weight:bold;">After allowing, please clear the browser from your recent apps and reopen.</p>';
  } else if (type==='gps_signal') {
    icon.textContent='📡'; title.textContent='Weak GPS Signal'; title.style.color='var(--warning-text)';
    text.innerHTML='<p>We couldn\'t get an accurate location reading.</p>'
      +'<ul style="margin-top:8px;padding-left:20px"><li>Step outside or near a window.</li><li>Turn WiFi ON — it helps GPS lock faster.</li></ul>';
  } else if (type==='camera') {
    icon.textContent='📸'; title.textContent='Camera Access Denied'; title.style.color='var(--error-color)';
    text.innerHTML='<p>Camera permission is required to capture your identity securely.</p>'
      +'<p style="margin-top:8px"><strong>🍎 iPhone:</strong> Settings → Safari/Chrome → Camera → Allow.</p>'
      +'<p style="margin-top:8px"><strong>🤖 Android:</strong> Site settings → Camera → Allow.</p>'
      +'<p style="margin-top:12px; color:var(--error-color); font-weight:bold;">After allowing, please clear the browser from your recent apps and reopen.</p>';
  }
  modal.style.display = 'flex';
}

function doVerifyGPS(isRetry) {
  document.getElementById('gpsMsg').innerText = 'Locating…'; 
  document.getElementById('gpsMsg').className = 'msg';
  if (!navigator.geolocation) { showError('gpsMsg','GPS not supported on this device.'); return; }

  navigator.geolocation.getCurrentPosition(
    pos => {
      coords = pos.coords;
      const b = branches.find(branch => branch[0] === document.getElementById('branch').value);
      if (!b) { showError('gpsMsg','Select branch first.'); return; }
      
      const R = 6371e3;
      const dLat = (b[1]-coords.latitude)*Math.PI/180;
      const dLon = (b[2]-coords.longitude)*Math.PI/180;
      const a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(coords.latitude*Math.PI/180)*Math.cos(b[1]*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
      const dist = R * 2 * Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
          
      const maxDist = isRetry ? 350 : 250;
      
      if (dist > maxDist) {
         if (!isRetry && navigator.onLine) {
             setTimeout(() => doVerifyGPS(true), 500);
         } else {
             showError('gpsMsg', dist>1000 ? `Too far (${(dist/1000).toFixed(1)}km)` : `Too far (${Math.round(dist)}m) — move closer`);
         }
      } else { 
        showSuccess('gpsMsg','Location Verified'); 
        activateStep(4); 
      }
    },
    err => { 
      if(err.code===1) {
        showGuideModal('gps'); 
      } else {
        if (!isRetry && navigator.onLine) {
           setTimeout(() => doVerifyGPS(true), 500);
        } else {
           showGuideModal('gps_signal'); 
        }
      }
    },
    {enableHighAccuracy:true, timeout:15000, maximumAge: isRetry ? 0 : 30000}
  );
}

function verifyGPS() {
  if (staffRestrictionError) {
    const msgEl = document.getElementById('staffMsg');
    msgEl.style.opacity = '0';
    setTimeout(() => {
      showError('staffMsg', staffRestrictionError);
      msgEl.style.opacity = '1';
      
      clearTimeout(warningTimer);
      warningTimer = setTimeout(() => {
        msgEl.style.opacity = '0';
        setTimeout(() => {
          if(document.getElementById('step2').classList.contains('activeStep')) {
            showSuccess('staffMsg', `Welcome ${staffName}`);
          }
          msgEl.style.opacity = '1';
        }, 300);
      }, 3000); 
    }, 300);
    return;
  }
  doVerifyGPS(false);
}

function startCamera() {
  if (!navigator.onLine) {
    showError('cameraMsg', 'You must have an internet connection to submit.');
    return;
  }

  const btn = document.getElementById('openCameraBtn');
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) { showGuideModal('camera'); return; }

  btn.classList.add('loading');
  btn.innerHTML = '<span class="btn-spinner" style="display:inline-block; vertical-align:middle; width:16px; height:16px; margin-right:8px;"></span><span style="vertical-align:middle;">Starting...</span>';
  clearMsg('cameraMsg');

  const constraints = { video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } }, audio: false };
  navigator.mediaDevices.getUserMedia(constraints)
    .then(stream => {
      videoStream = stream;
      const video = document.getElementById('cameraVideo');
      video.srcObject = stream;
      video.onloadedmetadata = () => {
        video.play().catch(()=>{});
        
        document.getElementById('videoContainerWrapper').classList.add('expanded');
        document.getElementById('cameraBackdrop').classList.add('show');
        video.classList.add('live');
        
        btn.classList.remove('loading');
        btn.innerText = 'Take Selfie';
      };
    })
    .catch(err => {
      console.warn('Camera failed:', err);
      btn.classList.remove('loading');
      btn.innerText = 'Take Selfie';
      showGuideModal('camera');
    });
}

function capturePhoto() {
  const video = document.getElementById('cameraVideo');
  const wrapper = document.getElementById('mainContainer'); 
  const vw = video.videoWidth || 1280, vh = video.videoHeight || 720;
  
  const cw = wrapper.offsetWidth, ch = wrapper.offsetHeight;
  const containerAspect = cw / ch;
  const videoAspect = vw / vh;
  
  let sWidth, sHeight, startX, startY;
  
  if (videoAspect > containerAspect) {
    sHeight = vh; sWidth = vh * containerAspect;
    startX = (vw - sWidth) / 2; startY = 0;
  } else {
    sWidth = vw; sHeight = vw / containerAspect;
    startX = 0; startY = (vh - sHeight) / 2;
  }
  
  const maxOutput = 720;
  const scale = (sWidth > maxOutput || sHeight > maxOutput) ? (maxOutput / Math.max(sWidth, sHeight)) : 1;
  
  const canvas = document.createElement('canvas');
  canvas.width = Math.round(sWidth * scale); 
  canvas.height = Math.round(sHeight * scale);
  const ctx = canvas.getContext('2d');
  
  ctx.translate(canvas.width, 0);
  ctx.scale(-1, 1);
  ctx.imageSmoothingEnabled = true; ctx.imageSmoothingQuality = 'high';
  
  ctx.drawImage(video, startX, startY, sWidth, sHeight, 0, 0, canvas.width, canvas.height);
  
  photo = canvas.toDataURL('image/jpeg', 0.85);

  document.getElementById('successPhoto').src = photo;
  stopCamera();
  submitAttendanceRealtime();
}

function stopCamera() {
  const wrapper = document.getElementById('videoContainerWrapper'), backdrop = document.getElementById('cameraBackdrop');
  wrapper.classList.remove('expanded'); backdrop.classList.remove('show');
  const video = document.getElementById('cameraVideo');
  video.classList.remove('live');
  
  const btn = document.getElementById('openCameraBtn');
  if (btn && !btn.classList.contains('loading')) btn.textContent = 'Take Selfie';
  
  setTimeout(() => {
    if (videoStream) { videoStream.getTracks().forEach(t => t.stop()); videoStream = null; }
    video.srcObject = null;
  }, 300);
}

function submitAttendanceRealtime() {
  const branch = document.getElementById('branch').value, staffID = document.getElementById('staffID').value;
  if (!branch||!staffID||!currentAction||!photo) return;
  
  if (!navigator.onLine) {
    showError('cameraMsg', 'No internet connection. Please connect to submit.');
    return;
  }

  Storage.set('last_staff_id_' + currentTerminal, staffID);
  
  const payload = {
    name: staffName, id: staffID, branch: branch, action: currentAction, image: photo,
    lat: coords ? coords.latitude : 0, lng: coords ? coords.longitude : 0,
    clientTimestamp: new Date().toISOString()
  };
  
  const btn = document.getElementById('openCameraBtn');
  btn.classList.add('loading');
  btn.disabled = true;
  btn.innerHTML = '<span class="btn-spinner" style="display:inline-block; vertical-align:middle; width:16px; height:16px; margin-right:8px;"></span><span style="vertical-align:middle;">Submitting...</span>';
  clearMsg('cameraMsg');

  fetchFromServer('recordAttendance', payload).then(res => {
    btn.classList.remove('loading');
    btn.disabled = false;
    btn.innerText = 'Take Selfie';
    finishSubmission(currentAction);
  }).catch(err => {
    btn.classList.remove('loading');
    btn.disabled = false;
    btn.innerText = 'Take Selfie';
    showError('cameraMsg', 'Submission Failed: ' + err.message);
  });
}

function finishSubmission(action) {
  const firstName = staffName.split(' ')[0] || staffName;
  const hrs = new Date().getHours(), mins = new Date().getMinutes(), timeVal = hrs + (mins / 60.0);
  let msg='';

  if (action === 'Clock In') {
    if (timeVal < 6.5)        { msg="Fantastic start — you're early today! Keep it up."; }
    else if (timeVal <= 7.66) { msg="Great, you are on time for the morning shift."; }
    else if (timeVal < 11.0)  { msg="Note: Late for morning shift."; }
    else if (timeVal < 14.0)  { msg="Early for the second shift. Great job!"; }
    else if (timeVal <= 14.66){ msg="On time for the second shift. Have a productive afternoon!"; }
    else                      { msg="Note: Late for afternoon shift."; }
  } else {
    if (hrs < 16) { msg="Have a wonderful afternoon!"; }
    else          { msg="Have a restful night!"; }
    
    if (hrs >= 18) { msg += " And remember to place your order."; }
  }

  document.getElementById('successBadge').textContent = action.toUpperCase();
  document.getElementById('successName').textContent = firstName;
  document.getElementById('successMsg').textContent = msg;
  
  document.getElementById('mainContainer').style.overflow = 'visible';
  document.getElementById('mainForm').style.display = 'none';
  document.getElementById('successScreen').style.display = 'flex';
}
</script>
